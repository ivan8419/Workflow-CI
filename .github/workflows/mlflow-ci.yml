name: MLflow CI - Model Training

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  train-model:
    runs-on: ubuntu-latest
    env:
      MLFLOW_TRACKING_URI: "sqlite:///${{ github.workspace }}/MLProject/mlflow.db"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.7'

      - name: Check Env
        run: |
          python --version
          pip --version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn mlflow==2.19.0 matplotlib seaborn

      - name: Run mlflow project
        working-directory: MLProject
        run: |
          rm -f mlflow.db
          mlflow run . --experiment-name Credit_Card_Fraud_Detection_CI --env-manager local

      - name: Get latest MLflow run_id
        working-directory: MLProject
        id: get_run
        run: |
          python -c "
          import mlflow
          client = mlflow.tracking.MlflowClient()
          experiment = client.get_experiment_by_name('Credit_Card_Fraud_Detection_CI')
          assert experiment is not None, 'Experiment not found'
          runs = client.search_runs(experiment_ids=[experiment.experiment_id], order_by=['start_time DESC'], max_results=1)
          assert len(runs) > 0, 'No runs found'
          print(f'Model trained successfully! Found {len(runs)} run(s), latest run_id: {runs[0].info.run_id}')
          "

      - name: Commit and push artifacts
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add MLProject/mlruns MLProject/mlflow.db
          git commit -m "Auto-commit MLflow artifacts [skip ci]" || echo "No changes to commit"
          git push