name: MLflow CI - Model Training (Advanced)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  DOCKER_IMAGE_NAME: credit-card-fraud-model

jobs:
  train-model:
    runs-on: ubuntu-latest

    steps:
      - name: Set up job
        run: echo "Starting MLflow CI Pipeline for Credit Card Fraud Detection"

      - name: Run actions/checkout@v3
        uses: actions/checkout@v3
        with:
          lfs: true

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.7'

      - name: Check Env
        run: |
          echo "Python version:"
          python --version
          echo ""
          echo "Pip version:"
          pip --version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn mlflow==2.19.0 matplotlib seaborn joblib

      - name: Set MLflow Tracking URI
        run: |
          echo "MLFLOW_TRACKING_URI=sqlite:///${{ github.workspace }}/MLProject/mlflow.db" >> $GITHUB_ENV
          echo "MLflow Tracking URI set to local SQLite database"

      - name: Run mlflow project
        working-directory: MLProject
        run: |
          rm -f mlflow.db
          mlflow run . --experiment-name Credit_Card_Fraud_Detection_CI --env-manager local

      - name: Install Python dependencies
        run: |
          pip freeze > MLProject/requirements.txt
          echo "Python dependencies saved"

      - name: Upload to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-artifacts
          path: |
            MLProject/mlruns/
            MLProject/mlflow.db
            MLProject/requirements.txt
            MLProject/namadataset_preprocessing/creditcard_preprocessed.csv
          retention-days: 30

      - name: Build Docker Model
        working-directory: MLProject
        run: |
          docker build -t ${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }} .

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag Docker Image
        run: |
          docker tag ${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }} ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:latest
          docker tag ${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }} ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }}

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }}

      - name: Post Log in to Docker Hub
        run: echo "Docker image successfully pushed to Docker Hub"

      - name: Post Set up Python 3.12.7
        run: echo "Python 3.12.7 setup completed"

      - name: Post Run actions/checkout@v3
        run: echo "Code checkout completed"

      - name: Complete job
        run: echo "MLflow CI Pipeline completed successfully!"
